name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Internal harness prepare
        run: pnpm run dev:prepare

      - name: Generate Convex codegen
        run: pnpm run harness:convex:codegen

      - name: Test
        run: pnpm run test

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare
        run: pnpm run dev:prepare

      - name: Build module
        run: pnpm run build

      - name: Type check
        run: pnpm run test:types

      - name: Maintained example doctor checks
        run: pnpm run check:examples:doctor

  release-verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Release verification
        run: pnpm run release:verify

  consumer-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        fixture:
          - consumer-smoke
          - consumer-smoke-auth
          - consumer-smoke-own-convex

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pack module
        id: pack
        run: |
          mkdir -p "$RUNNER_TEMP/pack"
          npm pack --pack-destination "$RUNNER_TEMP/pack"
          TARBALL_PATH="$(find "$RUNNER_TEMP/pack" -maxdepth 1 -type f -name '*.tgz' -print -quit)"
          test -f "$TARBALL_PATH"
          echo "tarball_path=$TARBALL_PATH" >> "$GITHUB_OUTPUT"

      - name: Copy fixture outside workspace
        run: |
          FIXTURE_DIR="$RUNNER_TEMP/${{ matrix.fixture }}"
          rm -rf "$FIXTURE_DIR"
          cp -R "tests/fixtures/${{ matrix.fixture }}" "$FIXTURE_DIR"
          echo "FIXTURE_DIR=$FIXTURE_DIR" >> "$GITHUB_ENV"

      - name: Install fixture dependencies
        run: pnpm --dir "$FIXTURE_DIR" install --no-frozen-lockfile

      - name: Install packed module in fixture
        run: pnpm --dir "$FIXTURE_DIR" add "${{ steps.pack.outputs.tarball_path }}"

      - name: Verify packed module resolves and CLI
        run: |
          test -f "$FIXTURE_DIR/node_modules/@lupinum/trellis/package.json"
          cd "$FIXTURE_DIR"
          node --input-type=module -e "for (const specifier of ['@lupinum/trellis', '@lupinum/trellis/args', '@lupinum/trellis/auth', '@lupinum/trellis/backend', '@lupinum/trellis/composables', '@lupinum/trellis/mcp', '@lupinum/trellis/mcp/advanced', '@lupinum/trellis/server', '@lupinum/trellis/testing', '@lupinum/trellis/type-primitives', '@lupinum/trellis/workspace']) await import.meta.resolve(specifier); console.log('resolved')"
          node -e "Promise.all([import('@lupinum/trellis'), import('@lupinum/trellis/args'), import('@lupinum/trellis/auth'), import('@lupinum/trellis/backend'), import('@lupinum/trellis/testing'), import('@lupinum/trellis/type-primitives'), import('@lupinum/trellis/workspace')]).then(() => console.log('imported')).catch((error) => { console.error(error); process.exit(1); })"
          pnpm exec trellis --help

      - name: Consumer build
        run: pnpm --dir "$FIXTURE_DIR" run build

      - name: Consumer typecheck
        run: pnpm --dir "$FIXTURE_DIR" run typecheck
