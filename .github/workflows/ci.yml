name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Internal harness prepare
        run: pnpm run dev:prepare

      - name: Generate Convex codegen
        run: pnpm run harness:convex:codegen

      - name: Test
        run: pnpm run test

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare
        run: pnpm run dev:prepare

      - name: Build module
        run: pnpm run build

      - name: Type check
        run: pnpm run test:types

      - name: Maintained example doctor checks
        run: pnpm run check:examples:doctor

  release-verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Release verification
        run: pnpm run release:verify

  consumer-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        fixture:
          - consumer-smoke
          - consumer-smoke-auth
          - consumer-smoke-own-convex

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pack module
        id: pack
        run: |
          mkdir -p "$RUNNER_TEMP/pack"
          TARBALL="$(npm pack --silent --pack-destination "$RUNNER_TEMP/pack" | tail -n 1)"
          echo "tarball_path=$RUNNER_TEMP/pack/$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Install fixture dependencies
        working-directory: tests/fixtures/${{ matrix.fixture }}
        run: pnpm install --no-frozen-lockfile

      - name: Install packed module in fixture
        working-directory: tests/fixtures/${{ matrix.fixture }}
        run: pnpm add "${{ steps.pack.outputs.tarball_path }}"

      - name: Verify packed module imports and CLI
        working-directory: tests/fixtures/${{ matrix.fixture }}
        run: |
          node -e "Promise.all([import('@lupinum/trellis'), import('@lupinum/trellis/args'), import('@lupinum/trellis/auth'), import('@lupinum/trellis/backend'), import('@lupinum/trellis/composables'), import('@lupinum/trellis/mcp'), import('@lupinum/trellis/mcp/advanced'), import('@lupinum/trellis/server'), import('@lupinum/trellis/testing'), import('@lupinum/trellis/type-primitives'), import('@lupinum/trellis/workspace')]).then(() => console.log('resolved')).catch((error) => { console.error(error); process.exit(1); })"
          pnpm exec trellis --help

      - name: Consumer build
        working-directory: tests/fixtures/${{ matrix.fixture }}
        run: pnpm run build

      - name: Consumer typecheck
        working-directory: tests/fixtures/${{ matrix.fixture }}
        run: pnpm run typecheck
