packages:
  - 'apps/*'
  - 'examples/*'
  - 'labs/*'
  - 'packages/*'
  - 'tests/fixtures/doctor-*'

minimumReleaseAge: 1440

overrides:
  # Release audit overrides. These affect local workspace resolution only; packed
  # package manifests must not ship override policy. Remove a line when
  # `pnpm why <name>` shows all upstream owners resolve the patched version
  # without help and `pnpm audit --prod --audit-level low` stays green.
  fast-uri: 3.1.2
  fast-xml-builder: 1.1.7
  hono: 4.12.18
  ip-address: 10.1.1
  kysely: 0.28.17
  mermaid: 11.15.0
  devalue: 5.8.1
  nitropack: 2.13.4
  simple-git: 3.36.0
  uuid: 11.1.1
  brace-expansion: 5.0.6
  qs: 6.15.2
  ws: 8.20.1

ignoredBuiltDependencies:
  - '@parcel/watcher'
  - '@tailwindcss/oxide'
  - esbuild
  - isolated-vm
  - unrs-resolver
  - vue-demi
